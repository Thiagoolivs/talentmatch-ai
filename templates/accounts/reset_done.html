{% extends 'base.html' %}

{% block title %}Senha Redefinida - TalentMatch{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mb-5">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold">Senha Redefinida!</h1>
            <p class="text-slate-500 mt-2">Sua senha foi alterada com sucesso</p>
        </div>

        <div class="card p-8">
            <div class="text-center space-y-5">
                <p class="text-slate-500 text-sm leading-relaxed">
                    Sua nova senha foi configurada. Agora você pode entrar na sua conta com a nova senha.
                </p>
                <a href="{% url 'accounts:login' %}" class="btn-primary w-full !py-3">Entrar na Conta</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

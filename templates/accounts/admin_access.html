{% extends 'base.html' %}

{% block title %}Suporte - TalentMatch{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-sm w-full">
        <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold">Acesso de Suporte</h1>
            <p class="text-slate-400 mt-2 text-sm">Área restrita para equipe técnica</p>
        </div>

        <div class="card p-6">
            {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                <div class="{% if message.tags == 'error' %}bg-red-50 border border-red-200 text-red-700{% else %}bg-brand-50 border border-brand-200 text-brand-700{% endif %} p-3 rounded-lg text-sm">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="form-label">Código de Acesso</label>
                    <input type="password" name="access_code" required class="input-field" placeholder="Digite o código">
                </div>

                <button type="submit" class="btn-secondary w-full">Acessar</button>
            </form>

            <div class="mt-4 text-center">
                <a href="{% url 'accounts:login' %}" class="text-slate-400 text-xs hover:underline">Voltar ao login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

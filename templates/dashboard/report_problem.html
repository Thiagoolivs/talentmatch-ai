{% extends 'base.html' %}

{% block title %}Reportar Problema - TalentMatch{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="card p-6 md:p-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold mb-1">Reportar Problema</h1>
            <p class="text-slate-500 text-sm">Descreva o que aconteceu e nossa equipe vai analisar</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="category" class="form-label">Categoria</label>
                <select name="category" id="category" required class="input-field">
                    <option value="">Selecione uma categoria</option>
                    {% for value, label in categories %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="title" class="form-label">Título</label>
                <input type="text" name="title" id="title" required maxlength="200" class="input-field" placeholder="Resumo do problema">
            </div>

            <div>
                <label for="description" class="form-label">Descrição</label>
                <textarea name="description" id="description" required rows="6" class="input-field" placeholder="Descreva o problema em detalhes. Inclua passos para reproduzir, se possível."></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <a href="{% url 'dashboard:index' %}" class="btn-secondary">Cancelar</a>
                <button type="submit" class="btn-primary">Enviar Problema</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

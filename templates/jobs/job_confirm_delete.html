{% extends 'base.html' %}

{% block title %}Excluir Vaga - TalentMatch{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16">
    <div class="card p-8 text-center">
        <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-3">Excluir Vaga</h1>
        <p class="text-slate-500 mb-8">Tem certeza que deseja excluir a vaga "<strong class="text-slate-700">{{ job.title }}</strong>"? Esta ação não pode ser desfeita.</p>

        <form method="post" class="flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'jobs:detail' job.pk %}" class="btn-secondary btn-lg">Cancelar</a>
            <button type="submit" class="btn-danger btn-lg">Excluir Vaga</button>
        </form>
    </div>
</div>
{% endblock %}
